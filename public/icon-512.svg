<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0033A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#grad1)"/>
  
  <!-- Phone icon -->
  <rect x="156" y="96" width="200" height="320" rx="20" fill="white" opacity="0.95"/>
  <rect x="176" y="116" width="160" height="240" rx="8" fill="#0033A0" opacity="0.3"/>
  
  <!-- Transfer arrows -->
  <g transform="translate(256, 256)">
    <!-- Arrow up-right -->
    <path d="M -30 20 L 30 -40 L 10 -20 M 30 -40 L 10 -60" 
