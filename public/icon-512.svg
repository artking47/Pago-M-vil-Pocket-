  </g>
  
  <!-- Dollar symbol -->
  <circle cx="256" cy="256" r="45" fill="#FDB913" opacity="0.9"/>
  <text x="256" y="280" font-family="Arial, sans-serif" font-size="50" font-weight="bold" 
        fill="white" text-anchor="middle">Bs</text>
</svg>
